<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tap Trail V2 — Abruzzo Trail Edition</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: monospace;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #gameCanvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      background: #000;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
      cursor: pointer;
    }
    #loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      font-size: 18px;
      color: #FFD700;
    }
    #loading code {
      background: #222;
      padding: 2px 6px;
      border-radius: 3px;
      color: #88FFCC;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="480" height="270"></canvas>
  <div id="loading">CARICAMENTO TAP TRAIL V2...</div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
